{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-16 sm:py-24 text-center">
    <div class="text-8xl mb-6 select-none" aria-hidden="true">📦</div>
    <h1 class="text-4xl font-bold text-gray-900 tracking-tight sm:text-5xl">404</h1>
    <p class="mt-2 text-lg font-semibold text-gray-700">Page Not Found</p>
    <p class="mt-4 max-w-md text-base text-gray-500">Sorry, we couldn't find the page you're looking for. It may have been moved, deleted, or never existed.</p>
    <div class="mt-8 flex flex-col sm:flex-row items-center gap-3">
        <a href="/" class="inline-flex items-center px-5 py-2.5 rounded-md text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 shadow-sm">
            <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
            </svg>
            Back to Home
        </a>
        {% if user %}
        <a href="/inventory/" class="inline-flex items-center px-5 py-2.5 rounded-md text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 shadow-sm">
            <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
            Go to Inventory
        </a>
        {% endif %}
    </div>
</div>
{% endblock %}
